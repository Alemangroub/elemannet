            // This script ensures that the search input toggles visibility without submitting the form.
            if (!document.body.dataset.globalListenerAttached) {
                document.body.dataset.globalListenerAttached = 'true';

                document.addEventListener('click', function(e) {
                    const searchIcon = e.target.closest('#search-icon');

                    if (!searchIcon) {
                        return;
                    }

                    e.preventDefault();

                    const searchInput = document.getElementById('search-input');
                    const searchForm = document.getElementById('search-form');

                    if (!searchInput || !searchForm) {
                        return;
                    }
                    
                    searchInput.classList.toggle('active');

                    if (searchInput.classList.contains('active')) {
                        searchInput.focus();
                    }
                });

                const searchForm = document.getElementById('search-form');
                if (searchForm) {
                    searchForm.addEventListener('submit', function(e) {
                        const searchInput = document.getElementById('search-input');
                        if (searchInput && searchInput.value.trim() === '') {
                            e.preventDefault(); // Prevent submission if the input is empty
                        }
                    });
                }
            }
